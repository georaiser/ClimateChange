name: geocascade_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  
  # Core Data Science & Geospatial Processing (Chapters 1 - 6)
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - requests

  # Cloud-Native STAC & GIS 
  - pystac-client
  - planetary-computer
  - rasterio
  - geopandas
  - shapely
  - pyproj

  # Advanced Hydrology & Zonal Statistics
  - pysheds
  - rasterstats

  # Real-World Vector Sourcing (Chapter 12 Capstone)
  - osmnx
  - networkx

  # NOTE: Advanced AI and Database dependencies (e.g., PyTorch, PostGIS, LangGraph) 
  # for Chapters 7-11 are intentionally excluded here to keep this environment lightweight. 
  # Please refer to the specific Chapter READMEs for their installation instructions.
